name: Docker Build and Push
on: [push, pull_request]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Docker tags
        id: tags
        run: |
          BRANCH="${{ github.ref_name }}"
          TAGS="ghcr.io/${{ github.repository_owner }}/monetarium-explorer:${{ github.sha }}"
          if [ "$BRANCH" = "main" ]; then
            TAGS="$TAGS,ghcr.io/${{ github.repository_owner }}/monetarium-explorer:latest"
          elif [[ "$BRANCH" == hotfix/* ]]; then
            SAFE_BRANCH=$(echo "$BRANCH" | tr '/' '-')
            TAGS="$TAGS,ghcr.io/${{ github.repository_owner }}/monetarium-explorer:$SAFE_BRANCH"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref_name, 'hotfix/') }}
          tags: ${{ steps.tags.outputs.tags }}
