# Minimal reverse-proxy example (plain HTTP/1.1). For production, terminate TLS
# and enable HTTP/2 — see cmd/dcrdata/sample-nginx.conf for a fuller config with
# "listen 443 http2 ssl", security headers, and direct static-asset serving.
# HTTP/2 multiplexes the many small static requests and is a notable page-load
# win over HTTP/1.1.
server {
    listen 80;
    server_name explorer.yourdomain.com;

    location / {
        proxy_pass http://127.0.0.1:7777;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /ws {
        proxy_pass http://127.0.0.1:7777;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 86400;
    }
}